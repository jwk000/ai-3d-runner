<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>空隙疾跑 — 极简隧道跑酷</title>
    <style>
      :root {
        color-scheme: dark;
        --hud-fg: #f4f6ff;
        --hud-accent: #6cf;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #050608;
        color: var(--hud-fg);
        font-family: 'Inter', 'SF Pro Text', system-ui, -apple-system, sans-serif;
        user-select: none;
        -webkit-user-select: none;
      }
      #app {
        position: relative;
        width: 100vw;
        height: 100vh;
      }
      canvas {
        position: absolute;
        inset: 0;
        display: block;
        width: 100%;
        height: 100%;
        z-index: 0;
      }
      #hud {
        position: absolute;
        inset: 0;
        z-index: 10;
        pointer-events: none;
        font-feature-settings: 'tnum' 1;
      }
      .hud-top {
        position: absolute;
        top: 20px;
        left: 24px;
        right: 24px;
        display: flex;
        justify-content: flex-start;
        font-size: 16px;
        letter-spacing: 0.04em;
        text-shadow: 0 1px 4px rgba(0, 0, 0, 0.7);
      }
      .hud-top .pill {
        background: rgba(10, 14, 24, 0.55);
        backdrop-filter: blur(8px);
        padding: 8px 14px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      .hud-top .pill strong {
        color: var(--hud-accent);
        font-weight: 600;
        margin-left: 4px;
      }
      .hud-help {
        position: absolute;
        bottom: 18px;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 12px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: rgba(244, 246, 255, 0.55);
        text-shadow: 0 1px 4px rgba(0, 0, 0, 0.7);
      }
      .hud-help kbd {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 4px;
        padding: 2px 6px;
        margin: 0 3px;
        font-family: inherit;
        font-size: 11px;
      }
      #banner {
        position: absolute;
        inset: 0;
        display: none;
        z-index: 20;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        background: rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(6px);
        pointer-events: auto;
      }
      #banner.visible {
        display: flex;
      }
      #banner h1 {
        font-size: 56px;
        margin: 0 0 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      #banner p {
        margin: 4px 0;
        font-size: 18px;
        opacity: 0.8;
      }
      #banner .cta {
        margin-top: 24px;
        padding: 14px 28px;
        border: 1px solid rgba(255, 255, 255, 0.3);
        background: rgba(255, 255, 255, 0.06);
        border-radius: 8px;
        color: inherit;
        font: inherit;
        cursor: pointer;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        font-size: 14px;
      }
      #banner .cta:hover {
        background: rgba(255, 255, 255, 0.14);
      }
      #loading {
        position: absolute;
        inset: 0;
        z-index: 30;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        opacity: 0.6;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="loading">隧道加载中…</div>
      <div id="hud" style="display: none">
        <div class="hud-top">
          <div class="pill">距离<strong id="hud-dist">0m</strong></div>
        </div>
        <div class="hud-help">
          <kbd>←</kbd> <kbd>→</kbd> 切换跑道 / 旋转隧道 · <kbd>Space</kbd> 跳跃 ·
          <kbd>Esc</kbd> 暂停
        </div>
      </div>
      <div id="banner">
        <h1 id="banner-title">已暂停</h1>
        <p id="banner-sub"></p>
        <button class="cta" id="banner-cta" type="button">继续</button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
